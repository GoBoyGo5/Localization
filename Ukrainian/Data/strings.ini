[Option Tooltip]
; Graphics
vsync = «Вертикальна синхронізація» система очікує, поки дисплей завершить поточний цикл оновлення, перш ніж побудувати наступний кадр. Це запобігає «розриву» зображення. Однак прив’язує частоту кадрів гри до частоти оновлення дисплея, що може спричинити певну затримку введення.
antialias = «Згладжування» використовується для згладжування зображення перед його відображенням. Дозволяє позбутися «сходинок» по краях моделей.
gamma = «Корекція гамми» використовується для налаштування оптимального коефіцієнта яскравості, щоб збалансувати гаму дисплея, якщо гра здається занадто темною або світлою. Дуже великі або малі значення можуть призвести до втрати деталізації зображення.
texlod = «Деталізація текстур» визначає відстань, на якій змінюється рівень деталізації текстур. Змініть цей параметр, якщо текстури мерехтять або виглядають надто розмитими.
vram = Текстури, що зберігаються у відеопам’яті (VRAM), завантажуються швидше. Однак це негативно позначається на їхній якості.
hudoffset = «Зміщення HUD» використовується для переміщення індикаторів витривалості та моргання, а також інших елементів інтерфейсу до центру екрана. Параметр призначений для використання з ультраширокими моніторами.
viewbob = «Хитання камери» визначає те, наскільки сильно буде хитатися камера під час пересування.
fov = «Поле зору» (FOV) визначає кут огляду гравця під час гри.

; Audio
musicvol = Регулює гучність фонової музики. Якщо повністю пересунути повзунок вліво, музика буде вимкнена.
soundvol = Регулює гучність звукових ефектів. Якщо повністю пересунути повзунок вліво, всі звуки будуть вимкнені.
localaudio = Вмикає використання дубльованого аудіо (за його наявності) з активної на даний момент локалізації.
subtitles = Вмикає відображення тексту поточного діалогу внизу екрану.
closedcaptions = Вмикає відображення тексту внизу екрану з описом звукових ефектів, що відтворюються в даний момент.
sfxautorelease = «Автовивільнення звуку» вивантажує звук з пам’яті, якщо він не використовується протягом 5 секунд. Це запобігає помилкам розподілу пам’яті.
usertrack = Дає можливість відтворювати власні композиції на 1-му каналі радіо. Ці композиції завантажуються з теки «SFX\Radio\UserTracks\». Щоб змінити композицію, натисніть «1», коли радіо вибрано.
usertrackmode = Режим відтворення для користувацьких композицій. У режимі «Повтор» всі файли відтворюються в алфавітному порядку. У режимі «Випадково» наступна композиція вибирається випадково.
usertrackmode.note = Зверніть увагу, що випадковий режим не запобігає повторному відтворенню вже програних композицій.
usertrackscan = Повторно перевіряє каталог композицій на наявність нових або видалених звукових файлів.

; Controls
mousesensitivty = Регулює швидкість курсора миші.
mousesmoothing = Регулює ступінь згладжування курсора миші.
binds = Налаштування схеми керування у грі.

; Advanced
showhud = Вмикає відображення індикаторів моргання та витривалості.
console = Вмикає можливість використання консолі розробника. Відкривається натисканням клавіші {0}.
console.note = Використання консолі вимикає можливість отримання досягнень Steam.
speedrunmode = Вмикає таймер та змінює спосіб відстеження часу проходження, щоб відповідати вимогам спідранінгу.
numericseeds = Дає змогу вводити зерно карти у вигляді цілих чисел, які використовуються для запуску внутрішнього генератора випадкових чисел гри. Якщо зерно не введено, використовується кількість мілісекунд від моменту запуску комп’ютера.
achpopup = Показувати спливаюче повідомлення при розблокуванні досягнення.
launcher = Дає змогу знову увімкнути запускач, якщо його було вимкнено.
showfps = Показувати кількість кадрів на секунду у лівому верхньому куті екрана.
framelimit = Обмежує частоту кадрів у грі до бажаного значення.
framelimit.note = Рекомендується 60 FPS або більше. Якщо ви помічаєте надмірну рваність кадрів, спробуйте зменшити це значення, щоб зробити частоту кадрів (FPS) стабільнішою.

