[Death Message]
008 = Суб’єкт D-9341 було знайдено під час поїдання доктора [ВИДАЛЕНО] у секторі [ВИДАЛЕНО]. Суб’єкт був негайно ліквідований «Дев’ятихвостою Лисицею» та направлений на розтин. Було підтверджено зараження SCP-008, після чого тіло було спалено.
008.gate = Суб’єкт D-9341 було знайдено блукаючим біля {0}. Суб’єкт був негайно ліквідований «Дев’ятихвостою Лисицею» та направлений на розтин. Було підтверджено зараження SCP-008, після чого тіло було спалено.
008.gate.a = Воріт A
008.gate.b = Воріт B
008zombie = Суб’єкт D-9341. Причина смерті: численні рвані рани та травми, завдані [ДАНІ ВИДАЛЕНО], який був заражений SCP-008. Суб’єкт був виявлений та ліквідований «Дев’ятихвостою Лисицею».
012 = Суб’єкт D-9341 було знайдено у калюжі крові поруч із SCP-012. Схоже, що суб’єкт роздер собі зап’ястя до крові та написав ще три рядки у композиції, після чого помер від втрати крові.
035.chamber = Суб’єкт D-9341 було знайдено мертвим у камері утримання SCP-035. Спостерігаються значні крововиливи з судин навколо очей, у ротовій порожнині та носі. Тіло суб’єкта направлено на експертизу.
035.tentacle = "Щоб із цим розібратися, звичайної групи зачистки буде недостатньо. Схоже, всередині камери утворилися два великі й надзвичайно активні відростки, схожі на щупальця. Їхня агресивність не має аналогів серед усього, що ми бачили раніше – схоже, під час прориву вони забили до смерті якогось бідолаху з класу D.»
035.tentacle.office = «Один великий і надзвичайно активний відросток, схожий на щупальце, судячи з усього, виріс із мертвого тіла вченого в офісній зоні [ВИДАЛЕНО]. Його агресивність не має аналогів серед усього, що ми бачили раніше – схоже, що під час прориву він забив до смерті якогось якогось бідолаху з класу D.»
049 = Активна одиниця SCP-049-2 була виявлена в [ВИДАЛЕНО]. Ліквідована «Дев’ятихвостою Лисицею».
049.chamber = У тунелі поруч із камерою SCP-049 було знайдено три (3) активні одиниці SCP-049-2. Ліквідовані «Дев’ятихвостою Лисицею».
0492 = Суб’єкт D-9341. Причина смерті: численні рвані рани та травми, завдані одиницею SCP-049-2.
096 = У [ДАНІ ВИДАЛЕНО] було знайдено велику кількість крові.  За результатами ДНК-аналізу встановлено, що вона належить суб’єкту D-9341. Ймовірно, він був [ДАНІ ВИДАЛЕНО] SCP-096.
106.pd = Суб’єкт D-9341. Тіло частково розклалося, ймовірно через ефект "корозії" SCP-106. Тіло утилізовано шляхом спалення.
106.pd.crushed = Окрім розкладання, типового для всіх жертв SCP-106, на тілі виявлено пошкодження, яких раніше не спостерігалося: масивний перелом черепа, три зламані ребра, перелом плеча та численні важкі рани.
106.pd.fall = Окрім розкладання, типового для всіх жертв SCP-106, суб’єкт отримав численні важкі переломи обох ніг.
173 = Суб’єкт D-9341. Причина смерті: смертельний перелом шиї. Імовірно, убитий SCP-173.
173.camera = Суб’єкт D-9341. Причина смерті: смертельний перелом шиї. Записи камер спостереження підтверджують, що суб’єкт був убитий SCP-173.
173.intro = Суб’єкт D-9341. Причина смерті: смертельний перелом шиї. За словами начальника служби безпеки Франкліна, який був присутній у камері SCP-173 під час порушення умов утримання, суб’єкт був убитий SCP-173 одразу після початку перебоїв в електромережі.
173.doors = «Якщо я не помиляюся, одна з головних цілей цих кімнат, це зупинити SCP-173, щоб він не просувався далі під час порушення умов утримання. То чия ж геніальна ідея була зробити там КЛЯТУ ВЕНТИЛЯЦІЮ РОЗМІРОМ З ЛЮДИНУ?!»
205 = Схоже, цикл SCP-205 повернувся до норми після аномалій, які спостерігалися під час [ВИДАЛЕНО]. Тіло суб’єкта D-9341 було знайдено всередині камери. Виявлено ознаки тупих травм, типових для персоналу, який потрапляв у камеру утримання в умовах відсутності освітлення.
420js = Суб’єкт D-9341 знайдений у коматозному стані в [ДАНІ ВИДАЛЕНО]. Суб’єкт тримав у руці предмет, схожий на сигарету, та широко посміхався. Хімічний аналіз сигарети не дав однозначних результатів, але, ймовірно, вона містить високу концентрацію  невідомої хімічної речовини, молекулярна структура якої надзвичайно схожа на структуру тетрагідроканабінолу.
427 = «Запитую підтримку від МОГ Ню-7. Нам потрібно більше вогневої потужності, щоб знищити його.»
895 = «Нам відомо, що він помер від зупинки серця. Я припускаю, що це сталося через SCP-895, хоча раніше ніколи не спостерігалося, щоб він впливав на відеообладнання з такої відстані. Потрібні подальші дослідження, щоб визначити, чи розширюється "червона зона" SCP-895.»
895.nvg = «Співробітник класу D дивився на SCP-895 через цифрові окуляри нічного бачення, у результаті чого загинув.»
895.finenvg = «Співробітник класу D дивився на SCP-895 через цифрові окуляри нічного бачення, ймовірно покращені за допомогою SCP-914. Можливо, суб’єкт був здатний частково протистояти меметичному впливу за допомогою цих окулярів. Вони були вилучені для подальшого дослідження.»
914.rough = «У вихідному відсіку SCP-914 було знайдено сильно понівечений труп. Після аналізу ДНК тіло було ідентифіковано як суб’єкта D-9341. Очевидно, суб’єкт був "перероблений" SCP-914 у режимі "Грубо", однак досі незрозуміло, як він опинився у вхідному відсіку і хто або що повернуло ключ.»
914.superman = У [ДАНІ ВИДАЛЕНО] було знайдено комбінезон співробітника класу D. Подальша експертиза показала, що комбінезон був наповнений 12,5 кілограмами субстанції, схожої на синій попіл. Хімічний аналіз речовини не дав однозначних результатів. Однак імовірно, що вона пов’язана з SCP-914.
939 = «Усі чотири (4) особини SCP-939, що втекли, були успішно спіймані та повернуті до камер утримання. Троє (3) з них влаштували неабиякий безлад у зоні зберігання 6. На місце направлено бригаду з прибирання.»
1025.cardiacarrest = «Він загинув від серцевого нападу після читання SCP-1025 – це точно. Чи існує таке явище, як психосоматичний серцевий напад, чи SCP-1025 має аномальні властивості, про які ми ще не знаємо?»
1123 = Суб’єкт D-9341 був застрелений після спроби напасти на члена «Дев’ятихвостої лисиці». Записи камер показують, що приблизно за 9 хвилин до цього суб’єкт блукав по зоні, вигукуючи китайською мовою фразу «позбутися чотирьох шкідників». SCP-1123 було виявлено неподалік у [ВИДАЛЕНО], що свідчить про те, що суб’єкт мав фізичний контакт з ним. Як саме SCP-1123 було вилучено з камери утримання, досі невідомо.
1048a = Мертве тіло, покрите вухами, було знайдено в [ВИДАЛЕНО]. Імовірно, суб’єкт був атакований одиницею SCP-1048-A та задихнувся до смерті через вуха. Тіло направлено на розтин.
1162 = Мертвий суб’єкт класу D був знайдений у камері утримання SCP-1162. Розтин показав, що його права легеня відсутня, що свідчить про взаємодію з SCP-1162.
1499 = Місцезнаходження SCP-1499 досі невідоме, але для розслідування повідомлень про жорстокий напад на церкву в російському місті [ВИДАЛЕНО] було відправлено розвідувальну групу.
14991 = Невідомий чоловік та мертвий співробітник класу D були знайдені у [ВИДАЛЕНО] «Дев’ятихвостою лисицею». Чоловік, як було зазначено, перебував у сильно збудженому стані і, схоже, говорив лише російською мовою. Його було поміщено у тимчасову зону стримування в [ВИДАЛЕНО] до прибуття перекладача.
14991.dimension = Усьому персоналу, що перебував в евакуаційному укритті LC-2 під час прориву, були введені анестетики класу B у зв’язку з Інцидентом 1499-E. Суб’єкт класу D, причетний до цього інциденту, помер незабаром після того, як його підстрелив агент [ВИДАЛЕНО].
guard.intro = Суб’єкт D-9341. Причина смерті: вогнепальне ураження голови. Записи з камер спостереження підтверджують, що суб’єкт був ліквідований агентом Улґріном незабаром після початку блокування об’єкта.
guard.gate.b = «Агент G. центру. Ліквідував утікаючого співробітника класу D у внутрішньому дворі Воріт B.»
apache = «CH-2 центру. Ліквідував утікаючого співробітника класу D біля {0}.»
apache.gate.a = Воріт A
apache.gate.b = Воріт B
ntf = Суб’єкт D-9341. Ліквідований «Дев’ятихвостою лисицею».
ntf.bloodloss = Суб’єкт D-9341 загинув від втрати крові після вогнепального поранення, завданого «Дев’ятихвостої лисиці».
tesla = Суб’єкт D-9341 убитий тесла-воротами в [ВИДАЛЕНО].
killbat = Суб’єкт D-9341 знайдений мертвим у вихідному відсіку SCP-914 поруч із предметом, схожим на звичайну батарейку 9V. Тіло суб’єкта вкрите сильними електричними опіками. Ймовірно, він загинув від електричного струму цієї батарейки. Батарейку вилучено для подальшого дослідження.
suicide_1 = [ВИДАЛЕНО]
suicide_2 = Суб’єкт D-9341 знайдений мертвим у секторі [ВИДАЛЕНО]. На суб’єкті не виявлено фізичних ушкоджень та жодних видимих ознак того, що саме його вбило. Тіло направлено на розтин.
suicide_3 = EXCP_ACCESS_VIOLATION
suicide_4 = Суб’єкт D-9341 знайдений мертвим у секторі [ВИДАЛЕНО]. Суб’єкт написав літери "kys" власною кров’ю поруч із собою. Жодних інших ознак фізичних ушкоджень або боротьби не виявлено. Тіло направлено на розтин.
gassed = Суб’єкт D-9341 знайдений мертвим у [ДАНІ ВИДАЛЕНО]. Причина смерті: задуха, спричинена газом.

