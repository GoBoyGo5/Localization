[Фонд SCP]
image path = foundationlogo.jpg
align x = left
align y = top
text1 = Фонд SCP - це організація, що займається стримуванням та дослідженням аномальних артефактів та форм життя.
text2 = «SCP» розшифровується як «Особливі Умови Здержування» (а офіційний девіз фонду — «Охороняти, Утримувати, Захищати"), що підсумовує як цілі, так і методи дій Фонду.
