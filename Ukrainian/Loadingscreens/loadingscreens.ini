[Мобільні оперативні групи]
image path = mtf.jpg
align x = center
align y = center
text1 = МОГ – це невеликі команди (зазвичай від десяти до двадцяти оперативників, хоча трапляються й групи, що налічують понад 50 оперативників), які спеціалізуються на специфічних ролях або реагують на конкретні ситуації.
text2 = Мобільна оперативна група Епсилон-11 («Дев’ятихвоста Лисиця») — це спеціально навчена оперативна група, яка спеціалізується на захисті та повторному утриманні предметів SCP, що утримуються в Зоні-[ДАНІ ВИДАЛЕНО].
text3 = До їхніх обов’язків входить усунення порушень умов утримання шляхом повторного захоплення всіх активних ворожих SCP, порятунок вцілілого персоналу Фонду та ліквідація всіх непокірних одиниць персоналу класу D.

[Окуляри нічного бачення]
image path = NVG.jpg
align x = right
align y = top
disablebackground = true
text1 = Стандартні окуляри нічного бачення видаються підрозділам МОГ у разі відключення електроенергії.
text2 = Вченим також видають їх, однак рекомендують зосередитися на евакуації під час відключення електроенергії.

[SCP-012]
image path = 012.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-012 був знайдений археологом К. М. Сандовалом під час розкопок гробниці на півночі Італії. Об’єкт – фрагмент рукописної музичної партитури твору під назвою «На горі Голгофа», що виглядає незакінченим.
text2 = Червоно-чорне чорнило спочатку вважалося якоюсь формою ягідного соку або натурального барвника, однак пізніше було ідентифіковано, що це людська кров багатьох суб’єктів. 
text3 = Декільком піддослідним було надано доступ до нот. У кожному випадку суб’єкти травмували себе, щоб використати власну кров для закінчення твору, що потягло за собою симптоми психозу та важкі травми.

[SCP-035]
image path = 035.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-035 виглядає як біла порцелянова маска коміка, хоча часом воно змінює вигляд на маску трагіка.
text2 = При розміщенні SCP-035 на обличчі особи, мозкові хвилі носія перекриваються альтернативними хвилями від SCP-035, що призводить до припинення мозкової діяльності та смерті мозку носія. Згодом носій стверджує, що є свідомістю, яка міститься в SCP-035.
text3 = Психологічний аналіз виявив, що SCP-035 володіє надзвичайно маніпулятивним характером і здатен викликати раптові та глибокі зміни психологічного стану співрозмовника. Також SCP-035 продемонстрував сильну схильність до садизму, переконуючи деяких співрозмовників покінчити життя самогубством самим лише переконанням.

[SCP-049]
image path = 049.jpg
align x = left
align y = center
disablebackground = true
text1 = SCP-049 має гуманоїдний вигляд, проте Фонд наразі не має можливості дослідити його обличчя та тіло детальніше, оскільки він вкритий тим, що, схоже, є одягом традиційного Чумного Лікаря з Європи XV-XVI століть.
text2 = Дотик SCP-049 є смертельним для будь-якої людини. Після контакту з рукою(-ами) SCP-049, жертва (надалі SCP-049-2) страждає від [ДАНІ ВИДАЛЕНО] та майже миттєво помирає.
text3 = Після SCP-049 дістає сумку, виготовлену з [ДАНІ ВИДАЛЕНО], що містить скальпелі, голку, нитку та кілька флаконів з поки що неідентифікованої речовини, і починає препарувати SCP-049-2 та проводити ін’єкції в його тіло різними хімічними речовинами.
text4 = Приблизно через 20 хвилин SCP-049 зашиє SCP-049-2 та знову стає спокійним. Опісля декількох хвилин SCP-049-2 демонструє відновлення життєво важливих показників та, схоже, оживає.

[SCP-066]
image path = 066.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-066 - це аморфна маса з переплетених ниток та стрічок загальною вагою близько одного кілограма.
text2 = Після інциденту 066-2 (дивіться звіт про інцидент 066-2), SCP-066 почав демонструвати поведінку, яка сильно суперечила його попереднім властивостям. 
text3 = Тепер SCP-066 став значно рухомішим і видає ноти та аномальні звукові ефекти у присутності будь-якої людини, незалежно від того, чи взаємодіє з SCP-066 ця людина.

[SCP-079]
image path = 079.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-079 – це мікрокомп’ютер Exidy Sorcerer, сконструйований у 1978 році. 
text2 = Невідомо, коли SCP-079 набув свідомості, але відомо, що його програмне забезпечення розвинулося до рівня, коли його апаратне забезпечення не мало б впоратися з ним, навіть у світі фантазій.
text3 = Він пройшов тест Тюрінга і є досить балакучим, хоча й дуже грубим і ненависним. Він також демонструє злісне бажання втекти.

[SCP-096]
image path = 096.png
align x = right
align y = bottom
disablebackground = true
text1 = SCP-096, як правило, надзвичайно спокійний. Датчики тиску всередині його камери свідчать про те, що він проводить більшу частину дня, ходячи вздовж східної стіни.
text2 = Проте, коли хтось бачить обличчя SCP-096 – безпосередньо, через відеозйомку чи навіть фотографію, – у об’єкта починається стан, подібний до значного емоційного стресу.
text3 = Приблизно через одну-дві хвилини після першого перегляду, SCP-096 починає бігти в напрямку людини, яка подивилася на його обличчя.

[SCP-106]
image path = 106.jpg
align x = right
align y = bottom
text1 = SCP-106 виглядає як гуманоїд, схожий на людину похилого віку з загальними ознаками гниття. Його вигляд може різнитись, але ознаки «гниття» спостерігаються в усіх випадках.
text2 = SCP-106 викликає корозійний ефект на будь-якому твердому матеріалі, до якого він торкається, який проявляється у тому, що зачеплений матеріал починає розкладатися через декілька секунд після контакту. Це виглядає як іржавіння, гниття та розтріскування матеріалу, і поява чорної, подібної до мускусу субстанції, яка схожа на ту, що покриває SCP-106.
text3 = SCP-106 здатен проходити крізь тверді матеріали, і ловить та вбиває своїх жертв, затягуючи їх в те, що, ймовірно, є його персональним «кишеньковим виміром».

[SCP-173]
image path = 173.jpg
align x = left
align y = bottom
text1 = SCP-173 виготовлений з бетону та арматури зі слідами аерозольної фарби марки Krylon. Він є живим і вкрай ворожим.
text2 = Об’єкт не може рухатися в той час, коли перебуває в межах прямої видимості. Однак зоровий контакт з SCP-173 не має бути розірвано навіть на мить. Персонал, призначений для входу в контейнер, проінструктований попереджати один одного перед тим, як моргнути.

[SCP-205]
image path = 205.jpg
align x = right
align y = bottom
disablebackground = true
text1 = SCP-205 - це пара прожекторів, що використовувалися у студійній фотографії. Світло, яке випромінює кожна з ламп SCP-205, поводиться унікальним чином та повністю проходить крізь будь-яку поверхню, яка не є білого кольору.
text2 = Якщо світло продовжує безперервно проходити крізь будь-яку матерію, не відкидаючи тіні, кожна лампа відображатиме тінь неідентифікованої молодої жінки на будь-якій плоскій білій поверхні, такій як проекційний екран у камері 52.

[SCP-294]
image path = 294.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-294 виглядає як стандартний торговий автомат для кави, єдиною помітною відмінністю є сенсорна панель для вводу запиту із кнопками, що відповідають англійській QWERTY-клавіатурі.
text2 = Після введення назви будь-якої рідини за допомогою панелі, автомат надає стандартний 12-унційний стаканчик та наливає в нього вказану рідину. 
text3 = Було проведено дев’яносто сім початкових випробувань (включаючи запити на воду, каву, пиво та содову, нехарчові речовини, такі як сірчана кислота, рідина для чищення склопластику та моторне масло, а також речовини, які зазвичай не існують у рідкому стані, такі як азот, залізо та скло), і кожен з цих запитів було успішно виконано.

[SCP-372]
image path = 372.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-372 являє собою істоту невідомого біологічного виду, приблизно 2 метри завдовжки від голови до хвоста і вагою близько 45 кілограмів. Воно має довге, тонке тіло з вісьмома парами вузьких кінцівок.
text2 = SCP-372 навчився прогнозувати рухи будь-кого навколо себе та використовує цю техніку, щоб ховатися за головою людини, що його шукає, або у будь-якій їх сліпій плямі.
text3 = У разі порушення умов утримання всьому персоналу рекомендується повідомляти про будь-які короткі мерехтливі рухи в кутку поля зору.

[SCP-427]
image path = 427.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-427 - маленький, сферичний, прикрашений різьбленням медальйон з полірованого сріблястого матеріалу. Різьблення, здається, не виконує жодної функції.
text2 = SCP-427 був створений з таблетки SCP-500, яку помістили у кабінку для сировини SCP-914 та обробили у режимі «Тонко». У закритому стані він не проявляє жодної незвичної активності. Коли SCP-427 відкритий і спрямований на біологічну тканину, він швидко регенерує пошкодження її клітин і якимось чином очищує від чужорідних сполук або інфекцій.
text3 = Проте довгострокове опромінення створює значну небезпеку для здоров’я. Оскільки медальйон зцілює ушкодження, він оптимізує природні системи організму. Піддослідні класу D, яких опромінювали пристроєм більш ніж годину, почали мутувати у безформну масу тканини.
text4 = Ці «М’ясні Потвори», створені SCP-427, є неймовірно агресивними та без розбору атакують будь-кого та весь персонал, яких бачать, зі смертельними наслідками. Вони дуже стійкі до більшості відомої зброї.

[SCP-500]
image path = 500.jpg
align x = right
align y = bottom
text1 = SCP-500 - це мала пластикова банка, яка наразі містить сорок сім (47) червоних пігулок.
text2 = Одна пігулка, прийнята перорально, ефективно виліковує суб’єкта від усіх недуг протягом двох годин, точний час залежить від кількості та тяжкості хвороб суб’єкта.
text3 = Попри численні намагання, усі спроби синтезу з’єднання, яке, імовірно, є дієвою речовиною пігулок, не увінчалися успіхом.

[SCP-513]
image path = 513.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-513 виглядає як непримітний іржавий коров’ячий дзвоник. Ніяких знаків або різьблень на його поверхні не видно через сильну корозію.
text2 = Приблизно через годину після будь-якого звуку, виданого SCP-513, усі потерпілі, хто його почув, починають краєм зору бачити істоту, визначену як SCP-513-1.
text3 = Всі допити, проведені до цього часу, вказують на те, що SCP-513-1 - це високий і худий гуманоїд з аномально великими руками.

[SCP-682]
image path = 682.jpg
align x = right
align y = bottom
text1 = SCP-682 - це велике створіння рептильної зовнішності та невідомого походження. SCP-682, схоже, ненавидить все живе, що він висловив у декількох інтерв’ю під час утримування
text2 = У SCP-682 завжди спостерігаються надзвичайно високі міцність, швидкість і рефлекси, хоча точний їх рівень залежить від загальної форми. Відновлювальні можливості та стійкість SCP-682 вражають: об’єкт здатен рухатися і розмовляти зі зруйнованим на 87% тілом.
text3 = SCP-682 має бути знищений як можливо швидше.

[SCP-714]
image path = 714.jpg
align x = center
align y = center
disablebackground = true
text1 = На перший погляд SCP-714 виглядає як звичайне кільце із зеленого нефриту, проте воно здатне розширюватися та стискатися, ідеально пристосовуючись до пальця будь-кого, хто до нього доторкнеться, хоча це найменш важлива з його властивостей.
text2 = Носіння SCP-714 має кілька суттєвих наслідків, зокрема виснаження, непереборне бажання відпочити/заснути, уповільнення реакцій та зниження розумових здібностей.
text3 = Носії SCP-714 демонструють підвищену стійкість до різних хімічних речовин та аномально високу стійкість до меметичних та психічних впливів.

[SCP-860]
image path = 860.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-860 - це темно-синій ключ непримітної форми.
text2 = Через, здавалося б, випадкові проміжки часу, на його лезі починає з’являтися серія чисел, які згодом утворюють координати UTM.
text3 = SCP-860 підходить до будь-яких дверних замків, що потребують ключа, які розміщені в області за заданими координатами.
text4 = Якщо за допомогою SCP-860 відімкнути двері та відчинити їх, то вони не приведуть до звичайного місця призначення. Натомість, вони виводитимуть на невелику лісову галявину з пішохідною доріжкою, надалі позначену як SCP-860-1.

[SCP-895]
image path = 895.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-895 - це оздоблена дубова труна, знайдена в морзі [ВИДАЛЕНО].
text2 = SCP-895 спричиняє збій обладнання відео- та фотоспостереження в межах 50 метрів, подібний до яскравих, тривожних галюцинацій з різною тривалістю і регулярністю, залежно від близькості камери до SCP-895.
text3 = В межах 5 метрів від SCP-895 зняті кадри можуть призвести до серйозних психологічних травм та істерій у більшості суб’єктів.

[SCP-914]
image path = 914.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-914 - це великий пристрій з часовим механізмом, що важить декілька тонн, займає площу у вісімнадцять квадратних метрів і складається з гвинтових передач, ременів, шківів, зубчастих коліс, пружин та інших подібних деталей. 
text2 = Якщо покласти предмет у приймальну кабінку та повернути ключ, SCP-914 почне його «обробляти». Цей процес не потребує ніякого живлення, а предмет обробляється відповідно до налаштувань, зазначених на передній панелі SCP-914.
text3 = До SCP-914 заборонено вносити жодну живу матерію.

[SCP-939]
image path = 939.jpg
align x = left
align y = top
disablebackground = true
text1 = SCP-939 - це ендотермічні стайні хижаки, у яких має місце характерна для троглобіонтів атрофія деяких систем органів. Середній зріст особин SCP-939 сягає 2,2 метри у вертикальному положенні, а середня вага - 250 кілограмів, хоча вага конкретної особини може дуже відрізнятися від середньої.
text2 = Головним методом приманювання здобичі SCP-939 є імітування людських голосів, зазвичай голосів її попередніх жертв, однак були зареєстровані випадки, коли істоти під час нічних полювань імітували звуки інших тварин.
text3 = Здобич зазвичай вбивається єдиним укусом у череп або шию. Сила прикусу становить 35 МПа.

[SCP-966]
image path = 966.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-966 можливо побачити лише в діапазоні довжин хвиль, який коливається приблизно від 700 нм до 900 нм. Це стосується усіх типів тканин SCP-966. 
text2 = Їхні методи полювання складаються з випромінювання сигналу раніше невідомої хвилі, яка перманентно пригнічує здатність ураженої істоти входити до будь-якого з етапів швидкого та повільного сну. Здатність до мікросну також втрачається.
text3 = Позбавивши своїх жертв сну, SCP-966 буде переслідувати свою здобич до того моменту, поки вона не втратить свідомість через відсутність відпочинку. У цей момент SCP-966 візьметься до споживання.

[SCP-970]
image path = 970.jpg
align x = center
align y = center
disablebackground = true
text1 = SCP-970 - це просторове явище, яке призводить до зациклення приміщення. В усіх випадках цей ефект проявляє себе через появу серії дверей у стінах, причому всі двері розташовані за прямою лінією та дозволяють пройти через них і опинитися на стартовій позиції. 
text2 = Цей ефект не має жодного впливу на сусідні кімнати та поверхи. На теперішній час немає жодного пояснення природи цього явища.
text3 = З моменту першого виявлення явища SCP-970 було виявлено й інші подібні випадки, причому [ДАНІ ВИДАЛЕНО]% з них — у радіусі 800 кілометрів від Сектора 19.

[SCP-1025]
image path = 1025.jpg
align x = right
align y = bottom
text1 = SCP-1025 - це книга у твердій палітурці, приблизно на 1500 сторінок. На обкладинці та корінці є назва «Енциклопедія поширених захворювань».
text2 = Жодних інших примірників книги з такою назвою та видавцем не було знайдено, а записів про видавця не існує.
text3 = Читачі книги, схоже, проявляють симптоми будь-якої хвороби, про яку вони читають. Ефект може проявитися через _ до __ годин.

[SCP-1123]
image path = 1123.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1123 - це людський череп, у якого відсутня нижня щелепа та всі зуби. На зовнішній поверхні лобової кістки нанесено сучасне кхмерське письмо, написане людською кров’ю, що перекладається як «Пам’ятай».
text2 = Генетичне тестування підтверджує, що і череп, і кров належать одній і тій же особі. Кхмерське письмо сильно вицвіло і тому непомітне для більшості суб’єктів на відстані понад 5 метрів.
text3 = Суб’єкти, що знаходяться на відстані 1 метра або менше від об’єкта, повідомлятимуть про свіжість крові, ніби вона "ще волога", а також про інші аномальні сенсорні явища, включаючи запахи, звуки та тактильні відчуття.

[SCP-1162]
image path = 1162.jpg
align x = center
align y = center
disablebackground = true 
text1 = SCP-1162 наразі являє собою отвір у стіні з шлакоблоків у Зоні-[ДАНІ ВИДАЛЕНО].
text2 = SCP-1162 активується, коли розумна істота простягає руку в отвір, після чого її пальці торкаються твердої поверхні, схожої на дотик до поточного розташування SCP-1162, і вона виявляє предмет, достатньо малий, щоб пройти крізь отвір.
text3 = Ці предмети повсюдно визнаються як щось, що користувач загубив або шукав у якийсь момент свого життя.

[SCP-1499]
image path = 1499.jpg
align x = right
align y = bottom
disablebackground = true 
text1 = SCP-1499 - це радянський протигаз ГП-5. Випробування та опресовування показали, що об’єкт досить герметичний для використання за прямим призначенням.
text2 = Аномальний ефект проявляється при надяганні SCP-1499 на голову людини. Приблизно через одну секунду після повного надягання об’єкта на голову, суб’єкт пропадає з виду і не реєструється жодними приладами.
text3 = Одягнувши SCP-1499, піддослідні, за їхніми словами, опиняються в місці, що радикально відрізняється від того, в якому перебували до того, як одягнули SCP-1499.

[Повстанці Хаосу]
image path = chaos.jpg
align x = left
align y = bottom
disablebackground = true
text1 = Повстанці Хаосу - це відколовшася група Фонду, створена групою ренегатів, які в 1924 році самовільно покинули службу, прихопивши з собою кілька надзвичайно цінних об’єктів SCP.
text2 = Головна оперативна база Повстанців невідома, як і їхні лідери. Ця організація є прямим противником Фонду, і між ними неодноразово відбувалися сутички через SCP.
text3 = Персонал повинен бути обізнаним про можливі рейди, теракти та шпигунів з боку Повстанців, а також повідомляти командування про будь-яку дивну поведінку інших співробітників.

[Персонал Класу-D]
image path = classd.jpg
align x = right
align y = bottom
text1 = Персонал класу D – це витратний персонал, який використовується для роботи з об’єктами рівня Кетер.
text2 = Персонал класу D набирається з числа ув’язнених. Перевага надається засудженим особам; у разі потреби може бути дозволено застосовувати Протокол 12, що дозволяє вербувати невинних або осіб, ув’язнених за менш тяжкі злочини.
text3 = Весь персонал класу D має бути ліквідований на початку місяця, а новий персонал має бути готовий замінити їх.

