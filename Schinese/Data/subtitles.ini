; Example
;
; [PATH\TO\SOUND\EFFECT]
; italic=true ; 本段落所有字幕行默认使用斜体，除非单行单独覆盖设置。
; 0=这段文字会在音效播放的瞬间立刻显示。
; 2.3=这段文字会在音效首次播放后 2.3 秒出现。
; 3.3=<voice=classd,bold=true,caption=true>这段文字在3.3秒后显示，使用D级人员语音配色、加粗字体，且仅在开启音效字幕时才会出现
; 3.8=<italic=false>本行取消开头的斜体规则，以正常字体显示；其余所有行仍保持斜体。
; 4.0=<r=0,g=255,b=0,length=10>本行文字为绿色，在屏幕上至少停留显示 10 秒。
;
; Available settings
; length=(秒数) - 若配音字幕时长超过5秒**必须填写**，否则字幕会在音效播放完毕前提前消失。
; voice=(语音名称) - 调用 voices.ini 中预设的语音配置参数。
; name=(角色名) - 指定当前字幕的说话角色名称。
; r, g, b=(0-255 数值) - 设置字幕文字的RGB颜色。
; bold, italic=(true/false) - 设置字幕字体是否加粗、是否斜体。
; caption=(true/false) - 设置是否为音效字幕；仅开启音效字幕功能时才会显示。
; minvolume=(0.0-1.0 数值) - 设置触发字幕所需的音效最小音量，音量低于该值则不显示字幕。
; cooldown=(秒数) - 设置字幕冷却时间；冷却期间再次播放该音效时，不会重复弹出字幕，用于防止重复音效刷屏。

